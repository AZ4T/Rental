# coturn configuration for Rental TURN/STUN
# Apply to /etc/turnserver.conf on the droplet, then `systemctl restart coturn`.
#
# Variables to replace before deploying:
#   ${TURN_SHARED_SECRET}  — paste the same value used by backend env
#   (everything else is already filled in for rental.bolatbekov.com)

# ── Network ─────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349

# Public IPv4 of this droplet — clients receive this in relay candidates
external-ip=207.154.199.80

# UDP relay port range — opening fewer ports than the default 49152-65535
# keeps the firewall rules tighter; bump if you expect heavy traffic.
min-port=49160
max-port=49200

# Bind to all interfaces by default. If the droplet has multiple NICs,
# pin to the public one with `listening-ip=207.154.199.80` and uncomment.
# listening-ip=207.154.199.80

# ── Authentication ──────────────────────────────────────────────────
# Short-term creds: backend generates `username=<expiry-ts>:<userId>`
# and `credential=base64(hmac-sha1(username, secret))`. Coturn rebuilds
# the HMAC with the same secret to validate. No persistent user DB.
use-auth-secret
static-auth-secret=${TURN_SHARED_SECRET}

realm=rental.bolatbekov.com
server-name=turn.rental.bolatbekov.com

# Refuse anyone trying to plain-text guess passwords against us
no-auth-pings
no-multicast-peers

# Block the TURN server from being used to attack internal services
# (RFC 8656 §4). These are the defaults we explicitly assert.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# ── TLS (TURNS / port 5349) ─────────────────────────────────────────
# Reuse the Let's Encrypt cert managed by certbot. Coturn needs read
# access — the install script symlinks /etc/turnserver/{cert,pkey}.pem
# pointing at /etc/letsencrypt/live/turn.rental.bolatbekov.com/.
cert=/etc/turnserver/cert.pem
pkey=/etc/turnserver/pkey.pem

# Modern TLS only
no-tlsv1
no-tlsv1_1
cipher-list="ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20:ECDH+AESGCM:DH+AESGCM:ECDH+AES:DH+AES:RSA+AESGCM:RSA+AES:!aNULL:!eNULL:!MD5"

# ── Logging ─────────────────────────────────────────────────────────
log-file=/var/log/turnserver/turnserver.log
simple-log
no-stdout-log
verbose
