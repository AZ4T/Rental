events { worker_connections 1024; }

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_user_agent $upstream_app {
        default         "frontend:3000";
        "~*(android|iphone|ipad|ipod|mobile|phone)" "mobile:8082";
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name rental.bolatbekov.com;
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main server — desktop → Next.js, mobile → Expo
    server {
        listen 443 ssl;
        server_name rental.bolatbekov.com;

        ssl_certificate /etc/letsencrypt/live/rental.bolatbekov.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rental.bolatbekov.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        set $backend  "backend:3001";
        set $minio    "minio:9000";

        location /socket.io/ {
            proxy_pass http://$backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        location /storage/ {
            rewrite ^/storage/(.*) /$1 break;
            proxy_pass http://$minio;
            proxy_http_version 1.1;
            proxy_set_header Host $minio;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://$upstream_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Port 8443 — always mobile + API
    server {
        listen 8443 ssl;
        server_name rental.bolatbekov.com;

        ssl_certificate /etc/letsencrypt/live/rental.bolatbekov.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rental.bolatbekov.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        set $backend "backend:3001";
        set $minio   "minio:9000";
        set $mobile  "mobile:8082";

        location /socket.io/ {
            proxy_pass http://$backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /storage/ {
            rewrite ^/storage/(.*) /$1 break;
            proxy_pass http://$minio;
            proxy_http_version 1.1;
            proxy_set_header Host $minio;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://$mobile;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
