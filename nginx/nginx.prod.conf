events { worker_connections 1024; }

http {
    map $http_user_agent $upstream_app {
        default         "frontend:3000";
        "~*(android|iphone|ipad|ipod|mobile|phone)" "mobile:8082";
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name rental.bolatbekov.com;
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main server — desktop → Next.js, mobile → Expo
    server {
        listen 443 ssl;
        server_name rental.bolatbekov.com;

        ssl_certificate /etc/letsencrypt/live/rental.bolatbekov.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rental.bolatbekov.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # WebSocket / Socket.io
        location /socket.io/ {
            proxy_pass http://backend:3001/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # REST API
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        # MinIO storage
        location /storage/ {
            rewrite ^/storage/(.*) /$1 break;
            proxy_pass http://minio:9000;
            proxy_http_version 1.1;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend or Mobile based on User-Agent
        location / {
            proxy_pass http://$upstream_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Port 8443 — always mobile + API (for React Native API calls)
    server {
        listen 8443 ssl;
        server_name rental.bolatbekov.com;

        ssl_certificate /etc/letsencrypt/live/rental.bolatbekov.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rental.bolatbekov.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /socket.io/ {
            proxy_pass http://backend:3001/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /storage/ {
            rewrite ^/storage/(.*) /$1 break;
            proxy_pass http://minio:9000;
            proxy_http_version 1.1;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://mobile:8082;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
