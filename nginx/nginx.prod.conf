events { worker_connections 1024; }

http {
    map $http_user_agent $is_mobile {
        default 0;
        "~*(android|iphone|ipad|ipod|mobile|phone)" 1;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name rental.bolatbekov.com;
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Frontend (Next.js) + API for browser clients
    server {
        listen 443 ssl;
        server_name rental.bolatbekov.com;

        ssl_certificate /etc/letsencrypt/live/rental.bolatbekov.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rental.bolatbekov.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Redirect mobile browsers to the Expo web app on :8443
        if ($is_mobile) {
            return 302 https://$host:8443$request_uri;
        }

        # WebSocket / Socket.io (for Next.js client)
        location /socket.io/ {
            proxy_pass http://backend:3001/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # REST API (for Next.js browser client)
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MinIO storage (images)
        location /storage/ {
            rewrite ^/storage/(.*) /$1 break;
            proxy_pass http://minio:9000;
            proxy_http_version 1.1;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # API + Socket.io + Storage + Mobile (port 8443)
    server {
        listen 8443 ssl;
        server_name rental.bolatbekov.com;

        ssl_certificate /etc/letsencrypt/live/rental.bolatbekov.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rental.bolatbekov.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # WebSocket / Socket.io
        location /socket.io/ {
            proxy_pass http://backend:3001/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # REST API
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MinIO storage (images)
        location /storage/ {
            rewrite ^/storage/(.*) /$1 break;
            proxy_pass http://minio:9000;
            proxy_http_version 1.1;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Mobile web app
        location / {
            proxy_pass http://mobile:8082;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
