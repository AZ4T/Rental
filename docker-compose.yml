services:
    postgres:
        image: postgres:16
        container_name: rental_postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - pgdata:/var/lib/postgresql/data
        # No host port mapping — DB is internal only
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 5s
            timeout: 5s
            retries: 10

    minio:
        image: minio/minio:latest
        container_name: rental_minio
        restart: unless-stopped
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
        command: server /data --console-address ":9001"
        # 9001 (admin console) is internal-only; 9000 exposed for direct image URLs
        ports:
            - "9000:9000"
        volumes:
            - miniodata:/data

    backend:
        build: ./backend
        container_name: rental_backend
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
            minio:
                condition: service_started
        environment:
            NODE_ENV: ${NODE_ENV}
            DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            JWT_SECRET: ${JWT_SECRET}
            JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
            JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
            COOKIE_SECURE: ${COOKIE_SECURE}
            MINIO_ENDPOINT: http://minio:9000
            MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
            MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
            MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
            MINIO_BUCKET: ${MINIO_BUCKET}
            PORT: 3001
            SMTP_HOST: ${SMTP_HOST}
            SMTP_PORT: ${SMTP_PORT}
            SMTP_SECURE: ${SMTP_SECURE}
            SMTP_USER: ${SMTP_USER}
            SMTP_PASS: ${SMTP_PASS}
            SMTP_FROM: ${SMTP_FROM}
            RESEND_API_KEY: ${RESEND_API_KEY}
            APP_URL: ${APP_URL}
            FRONTEND_URL: ${FRONTEND_URL}
            GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        ports:
            - "3001:3001"

    frontend:
        build:
            context: ./frontend
            args:
                NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        container_name: rental_frontend
        restart: unless-stopped
        depends_on:
            - backend
        environment:
            BACKEND_URL: http://backend:3001
            NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        ports:
            - "3000:3000"

    mobile:
        build:
            context: ../diplom-rental-mobile
            args:
                EXPO_PUBLIC_API_HOST: rental.bolatbekov.com
                EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        container_name: rental_mobile
        restart: unless-stopped
        depends_on:
            - backend
        ports:
            - "8082:8082"

    nginx:
        image: nginx:alpine
        container_name: rental_nginx
        restart: unless-stopped
        depends_on:
            - frontend
            - mobile
            - backend
        ports:
            - "80:80"
            - "443:443"
            - "8443:8443"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./nginx/certs:/etc/nginx/certs:ro

volumes:
    pgdata:
    miniodata:
