services:
    postgres:
        image: postgres:16
        container_name: rental_postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: rental
            POSTGRES_PASSWORD: rental
            POSTGRES_DB: rental_db
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data

    minio:
        image: minio/minio:latest
        container_name: rental_minio
        restart: unless-stopped
        environment:
            MINIO_ROOT_USER: minio
            MINIO_ROOT_PASSWORD: minio12345
        command: server /data --console-address ":9001"
        ports:
            - "9000:9000" # S3 API
            - "9001:9001" # MinIO Console
        volumes:
            - miniodata:/data

    backend:
    build: ./backend
    container_name: rental_backend
    restart: unless-stopped
    depends_on:
        - postgres
        - minio
    environment:
        DATABASE_URL: postgresql://rental:rental@postgres:5432/rental_db
        JWT_SECRET: your-secret-key
        JWT_REFRESH_SECRET: your-refresh-secret-key
        MINIO_ENDPOINT: http://minio:9000
        MINIO_ACCESS_KEY: minio
        MINIO_SECRET_KEY: minio12345
        MINIO_BUCKET: rentals
        PORT: 3001
    ports:
        - "3001:3001"

    frontend:
        build: ./frontend
        container_name: rental_frontend
        restart: unless-stopped
        depends_on:
            - backend
        environment:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        ports:
            - "3000:3000"

volumes:
    pgdata:
    miniodata:
