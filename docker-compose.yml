services:
    postgres:
        image: postgres:16
        container_name: rental_postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: rental
            POSTGRES_PASSWORD: rental
            POSTGRES_DB: rental_db
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U rental -d rental_db"]
            interval: 5s
            timeout: 5s
            retries: 10

    minio:
        image: minio/minio:latest
        container_name: rental_minio
        restart: unless-stopped
        environment:
            MINIO_ROOT_USER: minio
            MINIO_ROOT_PASSWORD: minio12345
        command: server /data --console-address ":9001"
        ports:
            - "9000:9000" # S3 API
            - "9001:9001" # MinIO Console
        volumes:
            - miniodata:/data

    backend:
        build: ./backend
        container_name: rental_backend
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
            minio:
                condition: service_started
        environment:
            DATABASE_URL: postgresql://rental:rental@postgres:5432/rental_db
            JWT_SECRET: your-secret-key
            JWT_REFRESH_SECRET: your-refresh-secret-key
            MINIO_ENDPOINT: http://minio:9000
            MINIO_PUBLIC_URL: http://172.20.10.2:9000
            MINIO_ACCESS_KEY: minio
            MINIO_SECRET_KEY: minio12345
            MINIO_BUCKET: rentals
            PORT: 3001
        ports:
            - "3001:3001"

    frontend:
        build: ./frontend
        container_name: rental_frontend
        restart: unless-stopped
        depends_on:
            - backend
        environment:
            NEXT_PUBLIC_API_URL: http://172.20.10.2/api
            NEXT_PUBLIC_SOCKET_URL: http://172.20.10.2
        ports:
            - "3000:3000"

    mobile:
        build: ../diplom-rental-mobile
        container_name: rental_mobile
        restart: unless-stopped
        depends_on:
            - backend
        ports:
            - "8082:8082"

    nginx:
        image: nginx:alpine
        container_name: rental_nginx
        restart: unless-stopped
        depends_on:
            - frontend
            - mobile
            - backend
        ports:
            - "80:80"
            - "443:443"
            - "8443:8443"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./nginx/certs:/etc/nginx/certs:ro

volumes:
    pgdata:
    miniodata:
