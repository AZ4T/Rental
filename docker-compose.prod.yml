services:
    postgres:
        image: postgres:16
        container_name: rental_postgres
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 5s
            timeout: 5s
            retries: 10

    minio:
        image: minio/minio:latest
        container_name: rental_minio
        restart: always
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
        command: server /data --console-address ":9001"
        volumes:
            - miniodata:/data

    backend:
        build: ./backend
        container_name: rental_backend
        restart: always
        depends_on:
            postgres:
                condition: service_healthy
            minio:
                condition: service_started
        environment:
            NODE_ENV: production
            DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            JWT_SECRET: ${JWT_SECRET}
            JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
            JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
            COOKIE_SECURE: "true"
            MINIO_ENDPOINT: http://minio:9000
            MINIO_PUBLIC_URL: https://rental.bolatbekov.com/storage
            MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
            MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
            MINIO_BUCKET: ${MINIO_BUCKET}
            PORT: 3001
            SMTP_HOST: ${SMTP_HOST}
            SMTP_PORT: ${SMTP_PORT}
            SMTP_SECURE: ${SMTP_SECURE}
            SMTP_USER: ${SMTP_USER}
            SMTP_PASS: ${SMTP_PASS}
            SMTP_FROM: ${SMTP_FROM}
            RESEND_API_KEY: ${RESEND_API_KEY}
            APP_URL: https://rental.bolatbekov.com
            FRONTEND_URL: https://rental.bolatbekov.com

    frontend:
        build: ./frontend
        container_name: rental_frontend
        restart: always
        depends_on:
            - backend
        environment:
            NODE_ENV: production
            BACKEND_URL: http://backend:3001

    mobile:
        build:
            context: ../diplom-rental-mobile
            args:
                EXPO_PUBLIC_API_HOST: rental.bolatbekov.com
        container_name: rental_mobile
        restart: always
        depends_on:
            - backend

    nginx:
        image: nginx:alpine
        container_name: rental_nginx
        restart: always
        depends_on:
            - frontend
            - mobile
            - backend
        ports:
            - "80:80"
            - "443:443"
            - "8443:8443"
        volumes:
            - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
            - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
    pgdata:
    miniodata:
